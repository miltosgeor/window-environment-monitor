<style>
:root {
  --bg-primary: #0b0f1a;
  --bg-card: rgba(255,255,255,0.025);
  --bg-card-hover: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text-primary: #e8ecf4;
  --text-secondary: #6b7a94;
  --text-muted: #3d4a5e;
  --accent-red: #f87171;
  --accent-blue: #60a5fa;
  --accent-green: #4ade80;
  --accent-purple: #c084fc;
  --accent-yellow: #facc15;
  --accent-orange: #fb923c;
  --accent-cyan: #22d3ee;
  --accent-pink: #f472b6;
  --accent-indigo: #818cf8;
  --circle: #FFD700;
  --district: #00A550;
  --piccadilly: #003688;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  line-height: 1.5;
  min-height: 100vh;
}

.container { max-width: 1320px; margin: 0 auto; padding: 20px 24px 40px; }

.header { margin-bottom: 24px; }
.header-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--accent-green); margin-bottom: 6px;
}
.header-badge::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 10px var(--accent-green), 0 0 20px rgba(74,222,128,0.3);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.header h1 {
  font-size: 30px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8ecf4 40%, #6b7a94);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-meta {
  font-size: 12px; color: var(--text-secondary); margin-top: 4px;
  font-family: var(--font-mono); font-weight: 400;
}

.tab-bar {
  display: flex; gap: 4px; margin-bottom: 20px;
  border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.tab-btn {
  padding: 10px 20px; border: none; background: transparent;
  color: var(--text-muted); font-size: 13px; font-weight: 600;
  font-family: var(--font-body); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  position: relative; bottom: -1px;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  transition: border-color 0.2s, background 0.2s;
}
.card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
.card-label {
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.6px;
  text-transform: uppercase; font-weight: 600; margin-bottom: 8px;
}
.card-value { font-size: 32px; font-weight: 700; line-height: 1; font-family: var(--font-mono); }
.card-unit { font-size: 14px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }
.card-sub { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }

.grid { display: grid; gap: 12px; }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.span-2 { grid-column: span 2; }

.chart-hint { font-size: 9px; color: var(--text-muted); text-align: right; margin-top: 3px; font-family: var(--font-mono); }
canvas { max-height: 240px; }

table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { text-align: left; color: var(--text-muted); padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }
tr.clickable { cursor: pointer; transition: 0.15s; }
tr.clickable:hover { background: rgba(255,255,255,0.03); }

.line-badge { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg-card); border-radius: var(--radius-sm); margin-bottom: 6px; border-left: 3px solid; }
.line-badge-name { flex: 1; font-size: 13px; font-weight: 600; text-transform: capitalize; }
.line-badge-status { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; }

.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }

.stat-box { background: var(--bg-card); border-radius: var(--radius-sm); padding: 12px 14px; border: 1px solid var(--border); }
.stat-box-title { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.stat-box-row { font-size: 10px; color: var(--text-secondary); line-height: 1.6; }
.stat-box-row b { color: var(--text-primary); font-family: var(--font-mono); font-size: 11px; }

.select-input { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 11px; font-family: var(--font-body); cursor: pointer; }
.select-input option { background: #1a1f2e; }

.callout { background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.15); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 12px; }
.callout-title { font-size: 12px; font-weight: 700; color: var(--accent-blue); margin-bottom: 4px; }
.callout-text { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.callout-stat { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--text-primary); }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-content { background: #111827; border: 1px solid var(--border-hover); border-radius: var(--radius); padding: 24px; max-width: 560px; width: 92%; max-height: 80vh; overflow: auto; }
.modal-content h3 { font-size: 16px; margin-bottom: 12px; }
.modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 2px 8px; }
.modal-close:hover { color: var(--text-primary); }

.footer { margin-top: 24px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

.hyp-bar { display: flex; gap: 4px; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 6px; }
.hyp-bar-seg { transition: width 0.4s; }

.anomaly-count { display: inline-flex; align-items: center; gap: 5px; background: rgba(248,113,113,0.1); color: var(--accent-red); padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; font-family: var(--font-mono); }

@media (max-width: 900px) {
  .grid-5, .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .span-2 { grid-column: span 1; }
  .tab-btn { padding: 8px 14px; font-size: 12px; }
}
</style>

<script>
const D = window.__DD;
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
};
const fmt = t => t ? new Date(t+'Z').toLocaleString('en-GB',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
const fmtFull = t => t ? new Date(t+'Z').toLocaleString('en-GB',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';

const COL = {
  red:'#f87171', blue:'#60a5fa', green:'#4ade80', purple:'#c084fc',
  yellow:'#facc15', orange:'#fb923c', cyan:'#22d3ee', pink:'#f472b6', indigo:'#818cf8'
};
const LC = { circle:'#FFD700', district:'#00A550', piccadilly:'#003688' };
const SL = {10:'Good Service',9:'Minor Delays',6:'Severe Delays',5:'Part Closure',1:'Closed',20:'Service Closed'};
const SC = {10:COL.green,9:COL.yellow,6:COL.red,5:COL.orange,1:COL.red,20:'#3d4a5e'};

Chart.defaults.color = '#6b7a94';
Chart.defaults.borderColor = 'rgba(255,255,255,0.03)';
Chart.defaults.font.family = "'DM Sans', system-ui";
Chart.defaults.font.size = 10;
Chart.defaults.animation.duration = 500;

const ZO = {
  zoom:{wheel:{enabled:true,speed:0.08},pinch:{enabled:true},mode:'x'},
  pan:{enabled:true,mode:'x'}
};

let activeTab = 'live';
let charts = {};
const m = D.meta;

$('#headerMeta').textContent = `Gloucester Road, London — ${m.sd} → ${m.ed} — ${m.days} days — ${m.sp.toLocaleString()} sensor + ${m.tp.toLocaleString()} TfL data points`;
$('#footerStats').textContent = `${m.sp.toLocaleString()} sensor + ${m.tp.toLocaleString()} TfL · Chart.js 4.4.7`;

function rolling(arr, w) {
  return arr.map((_, i) => {
    const slice = arr.slice(Math.max(0, i - w + 1), i + 1).filter(v => v != null);
    return slice.length ? +(slice.reduce((a, b) => a + b) / slice.length).toFixed(1) : null;
  });
}

function destroyCharts() {
  Object.values(charts).forEach(c => { if (c && c.destroy) c.destroy(); });
  charts = {};
}

function showModal(title, html) {
  $('#modalContainer').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-content"><button class="modal-close" onclick="closeModal()">✕</button><h3>${title}</h3>${html}</div></div>`;
}
window.closeModal = () => $('#modalContainer').innerHTML = '';

const TABS = [
  ['live','Live Data'],['analytics','Analytics'],
  ['corr','Correlations'],['transport','Transport']
];

function renderTabs() {
  const bar = $('#tabBar'); bar.innerHTML = '';
  TABS.forEach(([key, label]) => {
    const btn = el('button', `tab-btn${activeTab===key?' active':''}`, label);
    btn.onclick = () => { activeTab = key; destroyCharts(); renderTabs(); renderPage(); };
    bar.appendChild(btn);
  });
}

function interactionHint() {
  return '<div class="chart-hint">Scroll to zoom · Drag to pan · Double-click to reset</div>';
}

function renderPage() {
  const root = $('#pageContent'); root.innerHTML = '';
  const wrapper = el('div');
  ({live: buildLive, analytics: buildAnalytics, corr: buildCorrelations, transport: buildTransport})[activeTab](wrapper);
  root.appendChild(wrapper);
}

// ═══════════════════════════════════════
// LIVE DATA TAB
// ═══════════════════════════════════════
function buildLive(root) {
  const sd = D.sensor;
  const ad = D.arrivals;
  const last = sd[sd.length - 1] || {};
  const lastA = ad[ad.length - 1] || {};

  const kpis = el('div', 'grid grid-5');
  const kpiData = [
    {label:'Temperature', val:last.te?.toFixed(1), unit:'°C', color:COL.red, range:`${D.summary.temperature.min}–${D.summary.temperature.max}`},
    {label:'Humidity', val:last.hu?.toFixed(1), unit:'%', color:COL.blue, range:`${D.summary.humidity.min}–${D.summary.humidity.max}`},
    {label:'Pressure', val:last.pr?.toFixed(0), unit:'hPa', color:COL.green, range:`${D.summary.pressure.min}–${D.summary.pressure.max}`},
    {label:'Noise Level', val:last.no?.toFixed(1), unit:'dB', color:COL.purple, range:`μ=${D.summary.noise_db.mean}, σ=${D.summary.noise_db.std}`},
    {label:'Trains Nearby', val:lastA.tot?.toFixed(0), unit:'/poll', color:COL.yellow, range:`3 lines · Gloucester Rd`}
  ];
  kpiData.forEach(k => {
    kpis.innerHTML += `<div class="card"><div class="card-label">${k.label}</div><div class="card-value" style="color:${k.color}">${k.val??'—'}<span class="card-unit">${k.unit}</span></div><div class="card-sub">${k.range}</div></div>`;
  });
  root.appendChild(kpis);

  const cg = el('div', 'grid grid-2');
  cg.style.marginTop = '12px';
  cg.innerHTML = `
    <div class="card"><div class="card-label">Temperature & Humidity — Dual Axis</div><canvas id="chartTempHumid"></canvas>${interactionHint()}</div>
    <div class="card"><div class="card-label">Barometric Pressure — Weather Systems</div><canvas id="chartPressure"></canvas>${interactionHint()}</div>
    <div class="card span-2"><div class="card-label">Noise Level — Raw + Rolling Average + Anomaly Threshold</div><canvas id="chartNoise"></canvas>${interactionHint()}</div>
    <div class="card span-2"><div class="card-label">Train Arrivals by Line — Stacked</div><canvas id="chartTrains"></canvas>${interactionHint()}</div>`;
  root.appendChild(cg);

  requestAnimationFrame(() => {
    const labels = sd.map(d => fmt(d.t));
    const noise = sd.map(d => d.no);
    const toggleLegend = (e, item, legend) => {
      const meta = legend.chart.getDatasetMeta(item.datasetIndex);
      meta.hidden = !meta.hidden;
      legend.chart.update();
    };

    charts.tempHumid = new Chart($('#chartTempHumid'), {
      type:'line', data:{labels, datasets:[
        {label:'Temp °C', data:sd.map(d=>d.te), borderColor:COL.red, borderWidth:1.2, pointRadius:0, yAxisID:'y'},
        {label:'2h Avg', data:rolling(sd.map(d=>d.te),24), borderColor:COL.orange, borderWidth:2, pointRadius:0, borderDash:[4,2], yAxisID:'y'},
        {label:'Humidity %', data:sd.map(d=>d.hu), borderColor:COL.blue, borderWidth:1.2, pointRadius:0, yAxisID:'y1'}
      ]},
      options:{interaction:{mode:'index',intersect:false}, scales:{x:{ticks:{maxTicksLimit:8}},y:{position:'left',ticks:{color:COL.red}},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:COL.blue}}}, plugins:{zoom:ZO,legend:{labels:{boxWidth:10},onClick:toggleLegend}}}
    });

    charts.pressure = new Chart($('#chartPressure'), {
      type:'line', data:{labels, datasets:[
        {label:'hPa', data:sd.map(d=>d.pr), borderColor:COL.green, backgroundColor:COL.green+'15', fill:true, borderWidth:1.2, pointRadius:0}
      ]},
      options:{interaction:{mode:'index',intersect:false}, scales:{x:{ticks:{maxTicksLimit:8}},y:{min:Math.min(...sd.map(d=>d.pr))-2}}, plugins:{zoom:ZO,legend:{display:false}}}
    });

    charts.noise = new Chart($('#chartNoise'), {
      type:'line', data:{labels, datasets:[
        {label:'Noise dB', data:noise, borderColor:COL.purple+'44', borderWidth:0.7, pointRadius:0, fill:true, backgroundColor:COL.purple+'08'},
        {label:'2h Rolling', data:rolling(noise,24), borderColor:COL.pink, borderWidth:2.2, pointRadius:0},
        {label:`Threshold (${D.anomalyStats.threshold} dB)`, data:noise.map(()=>D.anomalyStats.threshold), borderColor:COL.red+'55', borderWidth:1, borderDash:[5,4], pointRadius:0}
      ]},
      options:{interaction:{mode:'index',intersect:false}, scales:{x:{ticks:{maxTicksLimit:10}}}, plugins:{zoom:ZO,legend:{labels:{boxWidth:10},onClick:toggleLegend}}}
    });

    const asub = ad.filter((_,i) => i%2===0);
    charts.trains = new Chart($('#chartTrains'), {
      type:'bar', data:{labels:asub.map(d=>fmt(d.t)), datasets:[
        {label:'Piccadilly', data:asub.map(d=>d.pi||0), backgroundColor:LC.piccadilly, stack:'s'},
        {label:'District', data:asub.map(d=>d.di||0), backgroundColor:LC.district, stack:'s'},
        {label:'Circle', data:asub.map(d=>d.ci||0), backgroundColor:LC.circle, stack:'s', borderRadius:{topLeft:2,topRight:2}}
      ]},
      options:{interaction:{mode:'index',intersect:false}, scales:{x:{ticks:{maxTicksLimit:8},stacked:true},y:{stacked:true}}, plugins:{zoom:ZO,legend:{labels:{boxWidth:10},onClick:toggleLegend}}}
    });
  });
}

function buildAnalytics(root) {
  const statsCard = el('div','card');
  const vars = [

    {n:'Humidity',k:'humidity',u:'%',c:COL.blue},

    <option value="humidity">Humidity (%)</option><option value="pressure">Pressure (hPa)</option>

  // Daily breakdown
  const dailyCard = el('div','card');
  dailyCard.innerHTML = '<div class="card-label">Daily Noise Breakdown — Click for Details</div><canvas id="chartDaily"></canvas>';
  grid.appendChild(dailyCard);

  // Hypothesis testing
  const hypCard = el('div','card');
  hypCard.style.padding = '12px 16px';
  hypCard.style.alignSelf = 'start';
  hypCard.innerHTML = `<div class="card-label" style="margin-bottom:4px">Hypothesis Testing — Day (07:00–19:00) vs Night</div>
    <div style="font-size:10px;color:var(--text-secondary);margin-bottom:6px">H₀: No difference · H₁: Significant difference · Welch's t-test</div>
    <table><tr><th>Metric</th><th>Day μ</th><th>Night μ</th><th>t-stat</th><th>p-value</th><th>Cohen's d</th><th>Result</th></tr>
    ${['noise','temp','humid'].map(k => {
      const t = D.ttests[k], dn = D.dayNight;
      const info = {noise:['Noise (dB)',dn.day.noise,dn.night.noise],temp:['Temp (°C)',dn.day.temp,dn.night.temp],humid:['Humidity (%)',dn.day.humid,dn.night.humid]};
      const [label,dayVal,nightVal] = info[k];
      const sig = parseFloat(t.p) < 0.001;
      return `<tr><td><b>${label}</b></td><td>${dayVal}</td><td>${nightVal}</td><td>${t.t}</td>
        <td style="color:${sig?COL.green:COL.red}">${t.p}</td><td>${t.cohens_d}</td>
        <td><span class="pill" style="background:${sig?'rgba(74,222,128,0.12);color:'+COL.green:'rgba(248,113,113,0.12);color:'+COL.red}">${sig?'SIG ***':'NS'}</span></td></tr>`;
    }).join('')}</table>
    <div style="font-size:9px;color:var(--text-muted);margin-top:4px;font-family:var(--font-mono)">|d| < 0.2 negligible · 0.2–0.5 small · 0.5–0.8 medium · > 0.8 large</div>`;
  grid.appendChild(hypCard);

  // Weekend vs weekday (sits next to hypothesis — both compact)
  const wcCard = el('div','card');
  wcCard.style.padding = '12px 16px';
  wcCard.style.alignSelf = 'start';
  const wc = D.weekComp;
  wcCard.innerHTML = `<div class="card-label" style="margin-bottom:4px">Weekday vs Weekend Comparison</div>
    <table><tr><th>Metric</th><th>Weekday</th><th>Weekend</th><th>Diff</th></tr>
    ${[['Noise (dB)',wc.weekday.noise,wc.weekend.noise],['Temp (°C)',wc.weekday.temp,wc.weekend.temp],['Humidity (%)',wc.weekday.humid,wc.weekend.humid],['Trains/poll',wc.weekday.trains,wc.weekend.trains]].map(([l,wd,we])=>{
      const diff = (parseFloat(we)-parseFloat(wd)).toFixed(2);
      return `<tr><td><b>${l}</b></td><td>${wd}</td><td>${we}</td><td style="color:${diff>0?COL.orange:COL.cyan}">${diff>0?'+':''}${diff}</td></tr>`;
    }).join('')}</table>
    <div style="font-size:9px;color:var(--text-muted);margin-top:4px">n(weekday)=${wc.weekday.count} · n(weekend)=${wc.weekend.count}</div>`;
  grid.appendChild(wcCard);

  // Anomaly detection (full width)
  const anomCard = el('div','card span-2');
  const anomStats = D.anomalyStats;
  anomCard.innerHTML = `<div class="card-label">Anomaly Detection <span class="anomaly-count">${anomStats.count} spikes (${anomStats.pct}%)</span></div>
    <div style="font-size:10px;color:var(--text-secondary);margin-bottom:8px">Threshold: mean + 2σ = ${anomStats.threshold} dB · Top ${D.anomalies.length} anomalies shown</div>
    <div class="grid grid-2" style="margin-bottom:10px">
      <div><canvas id="chartAnomByHour"></canvas></div>
      <div><canvas id="chartAnomByCause"></canvas></div>
    </div>
    <table><tr><th>Time</th><th>Noise (dB)</th><th>σ above</th><th>Cause</th></tr>
    ${D.anomalies.slice(0,8).map(a => `<tr class="clickable" onclick="showModal('Anomaly Detail','<div class=\\'stat-box\\'><div class=\\'stat-box-row\\'>Time: <b>${fmtFull(a.time)}</b></div><div class=\\'stat-box-row\\'>Noise: <b>${a.noise_db} dB</b></div><div class=\\'stat-box-row\\'>σ above mean: <b>${a.sigma}</b></div><div class=\\'stat-box-row\\'>Cause: <b>${a.cause}</b></div><div class=\\'stat-box-row\\'>Day: <b>${a.day_name}</b></div></div>')">
      <td style="font-family:var(--font-mono);font-size:10px">${fmt(a.time)}</td>
      <td><b style="color:${a.noise_db>100?COL.red:a.noise_db>90?COL.orange:COL.yellow}">${a.noise_db}</b> dB</td>
      <td>${a.sigma}σ</td><td>${a.cause}</td></tr>`).join('')}
    </table>
    ${D.anomalies.length>8?`<div style="font-size:10px;color:var(--text-muted);margin-top:6px;cursor:pointer;text-decoration:underline" onclick="showModal('All Anomalies (Top 100)','<table style=\\'width:100%\\'><tr><th>Time</th><th>dB</th><th>σ</th><th>Cause</th></tr>${D.anomalies.map(a=>`<tr><td style=\\'font-size:9px\\'>${fmt(a.time)}</td><td><b>${a.noise_db}</b></td><td>${a.sigma}</td><td>${a.cause}</td></tr>`).join('')}</table>')">View all ${D.anomalies.length} anomalies →</div>`:''}`;
  grid.appendChild(anomCard);

  root.appendChild(grid);

  requestAnimationFrame(() => {
    // Distribution chart
    function drawDist(key) {
      if (charts.dist) charts.dist.destroy();
      const dd = D.distributions[key];
      const distColors = {noise_db:COL.purple,temperature:COL.red,humidity:COL.blue,pressure:COL.green,total_arrivals:COL.yellow};
      const c = distColors[key]||COL.blue;
      charts.dist = new Chart($('#chartDist'), {
        type:'bar', data:{labels:dd.map(d=>d.x), datasets:[
          {data:dd.map(d=>d.y), backgroundColor:c+'33', borderColor:c, borderWidth:1, borderRadius:2}
        ]},
        options:{scales:{x:{ticks:{maxTicksLimit:10}},y:{title:{display:true,text:'Count'}}}, plugins:{legend:{display:false}}}
      });
    }
    drawDist('noise_db');
    $('#distSelect').onchange = e => drawDist(e.target.value);

    // Daily noise chart
    const dd = D.daily;
    charts.daily = new Chart($('#chartDaily'), {
      type:'bar', data:{labels:dd.map(d=>d.date), datasets:[
        {label:'Mean dB', data:dd.map(d=>d.noise_mean), backgroundColor:COL.purple+'55', borderColor:COL.purple, borderWidth:1, borderRadius:3},
        {label:'Max dB', data:dd.map(d=>d.noise_max), type:'line', borderColor:COL.red, borderWidth:1.5, pointRadius:3, pointBackgroundColor:COL.red}
      ]},
      options:{interaction:{mode:'index',intersect:false}, scales:{y:{min:60}},
        plugins:{legend:{labels:{boxWidth:10}},tooltip:{callbacks:{afterBody:(items)=>{
          const i = items[0].dataIndex; const d = dd[i];
          return `Std: ${d.noise_std}\nSamples: ${d.count}`;
        }}}},
        onClick:(e,elements)=>{
          if(elements.length){
            const i = elements[0].index; const d = dd[i];
            showModal(`Daily Detail — ${d.date}`,
              `<div class="grid grid-2" style="gap:8px">
              <div class="stat-box"><div class="stat-box-title" style="color:${COL.red}">Temperature</div><div class="stat-box-row">Mean: <b>${d.temp_mean}°C</b></div><div class="stat-box-row">Range: <b>${d.temp_min}–${d.temp_max}°C</b></div></div>
              <div class="stat-box"><div class="stat-box-title" style="color:${COL.blue}">Humidity</div><div class="stat-box-row">Mean: <b>${d.humid_mean}%</b></div></div>
              <div class="stat-box"><div class="stat-box-title" style="color:${COL.green}">Pressure</div><div class="stat-box-row">Mean: <b>${d.press_mean} hPa</b></div></div>
              <div class="stat-box"><div class="stat-box-title" style="color:${COL.purple}">Noise</div><div class="stat-box-row">Mean: <b>${d.noise_mean} dB</b> · Max: <b>${d.noise_max} dB</b></div><div class="stat-box-row">σ: <b>${d.noise_std}</b> · n: <b>${d.count}</b></div></div>
              <div class="stat-box"><div class="stat-box-title" style="color:${COL.yellow}">Trains</div><div class="stat-box-row">Mean: <b>${d.trains_mean}/poll</b></div><div class="stat-box-row">Total: <b>${d.trains_sum}</b> (${d.trains_count} polls)</div></div>
              </div>`);
          }
        }
      }
    });

    // Anomaly by hour
    charts.anomHour = new Chart($('#chartAnomByHour'), {
      type:'bar', data:{labels:D.anomByHour.map((_,i)=>i+'h'), datasets:[
        {data:D.anomByHour, backgroundColor:D.anomByHour.map(v=>v>80?COL.red+'aa':v>40?COL.orange+'88':COL.yellow+'55'), borderRadius:2}
      ]},
      options:{scales:{x:{ticks:{maxTicksLimit:12}},y:{title:{display:true,text:'Anomalies'}}}, plugins:{legend:{display:false},title:{display:true,text:'By Hour',font:{size:10}}}}
    });

    // Anomaly by cause
    const causes = D.anomByCause.slice(0,7);
    const causeColors = [COL.red,COL.orange,COL.yellow,COL.green,COL.blue,COL.purple,COL.cyan];
    charts.anomCause = new Chart($('#chartAnomByCause'), {
      type:'doughnut', data:{labels:causes.map(c=>c.cause), datasets:[
        {data:causes.map(c=>c.count), backgroundColor:causeColors.map(c=>c+'88'), borderColor:'transparent', borderWidth:0}
      ]},
      options:{plugins:{legend:{position:'right',labels:{boxWidth:8,font:{size:9}}},title:{display:true,text:'By Cause',font:{size:10}}}}
    });
  });
}

// ═══════════════════════════════════════
// CORRELATIONS TAB
// ═══════════════════════════════════════
function buildCorrelations(root) {
  // Key finding callout
  const callout = el('div','callout');
  const nc = D.correlations.noise__trains_hourly;
  callout.innerHTML = `<div class="callout-title">🔑 Key Finding — Window Hypothesis Confirmed</div>
    <div class="callout-text">Hourly noise levels and train frequency at Gloucester Road show a <span class="callout-stat">Pearson r = ${nc.r}</span> correlation (p ${parseFloat(nc.p)<0.001?'< 0.001':'= '+nc.p}). This strong positive relationship confirms the core hypothesis: noise measured at the window is strongly driven by nearby underground train activity.</div>`;
  root.appendChild(callout);

  const grid = el('div','grid grid-2');
  grid.style.marginTop = '12px';

  // Scatter plot
  const scatterCard = el('div','card');
  scatterCard.innerHTML = `<div class="card-label">Scatter — <span id="scatterTitle">Temperature</span> vs Noise <select class="select-input" id="scatterXSelect">
    <option value="temp">Temperature</option><option value="humid">Humidity</option>
    <option value="press">Pressure</option></select> <span style="font-size:9px;color:var(--text-muted)">Day/Night coloring</span></div>
    <canvas id="chartScatter"></canvas>${interactionHint()}`;
  grid.appendChild(scatterCard);

  // Correlation matrix heatmap
  const matCard = el('div','card');
  const matLabels = ['Temp','Humidity','Pressure','Noise'];
  const matrixData = D.corrMatrix;
  function valToColor(v) {
    if (v > 0) return `rgba(96,165,250,${Math.abs(v)*0.8})`;
    if (v < 0) return `rgba(248,113,113,${Math.abs(v)*0.8})`;
    return 'rgba(255,255,255,0.03)';
  }
  matCard.innerHTML = `<div class="card-label">Correlation Matrix — Pearson r</div>
    <table style="table-layout:fixed">
      <tr><th style="width:70px;border:none"></th>${matLabels.map(l=>`<th style="text-align:center;border:none;padding:8px 4px;font-size:10px">${l}</th>`).join('')}</tr>
      ${matrixData.map((row,ri) => `<tr>
        <td style="font-weight:600;font-size:10px;color:var(--text-secondary);padding:4px 8px;border:none">${matLabels[ri]}</td>
        ${row.map(v => {
          const textCol = Math.abs(v)>0.3?'#e8ecf4':'#6b7a94';
          return `<td style="text-align:center;font-family:var(--font-mono);font-weight:700;font-size:13px;padding:14px 4px;background:${valToColor(v)};color:${textCol};border:1px solid rgba(255,255,255,0.03);border-radius:4px">${v.toFixed(2)}</td>`;
        }).join('')}
      </tr>`).join('')}
    </table>
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px;justify-content:center">
      <div style="display:flex;align-items:center;gap:4px"><div style="width:14px;height:14px;border-radius:3px;background:rgba(248,113,113,0.6)"></div><span style="font-size:9px;font-family:var(--font-mono);color:var(--text-secondary)">Negative</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:14px;height:14px;border-radius:3px;background:rgba(255,255,255,0.03);border:1px solid var(--border)"></div><span style="font-size:9px;font-family:var(--font-mono);color:var(--text-secondary)">Zero</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:14px;height:14px;border-radius:3px;background:rgba(96,165,250,0.6)"></div><span style="font-size:9px;font-family:var(--font-mono);color:var(--text-secondary)">Positive</span></div>
    </div>`;
  grid.appendChild(matCard);

  // Pairwise correlations table
  const pairCard = el('div','card span-2');
  const corrs = D.correlations;
  pairCard.innerHTML = `<div class="card-label">Pairwise Correlation Details</div>
    <table><tr><th>Pair</th><th>Pearson r</th><th>p-value</th><th>Slope</th><th>Strength</th></tr>
    ${Object.entries(corrs).map(([k,v]) => {
      const label = k.replace(/__/g,' ↔ ').replace(/_/g,' ');
      const absR = Math.abs(parseFloat(v.r));
      const strength = absR>0.7?'Strong':absR>0.4?'Moderate':absR>0.2?'Weak':'Negligible';
      const sColor = absR>0.7?COL.green:absR>0.4?COL.yellow:absR>0.2?COL.orange:COL.red;
      return `<tr><td style="text-transform:capitalize">${label}</td>
        <td><b style="font-family:var(--font-mono)">${v.r}</b></td>
        <td style="color:${parseFloat(v.p)<0.001?COL.green:COL.red}">${v.p}</td>
        <td>${v.slope||'—'}</td>
        <td><span class="pill" style="background:${sColor}22;color:${sColor}">${strength}</span></td></tr>`;
    }).join('')}</table>`;
  grid.appendChild(pairCard);

  root.appendChild(grid);

  requestAnimationFrame(() => {
    // Scatter plot
    function drawScatter(xKey) {
      if (charts.scatter) charts.scatter.destroy();
      const xMap = {temp:'Temperature (°C)',humid:'Humidity (%)',press:'Pressure (hPa)'};
      const xNames = {temp:'Temperature',humid:'Humidity',press:'Pressure'};
      $('#scatterTitle').textContent = xNames[xKey];
      // Rebuild scatter data based on selected axis
      const sData = D.scatter;
      // scatter data: x=temp, y=noise, h=hour by default
      // For humid/press we need to remap — but we only have temp vs noise in scatter[]
      // So we use sensor data directly for other axes
      let points;
      if (xKey === 'temp') {
        points = sData.map(d => ({x:d.x, y:d.y, isDay:d.h>=7&&d.h<19}));
      } else {
        const field = {humid:'hu', press:'pr'}[xKey];
        points = D.sensor.filter((_,i)=>i%10===0).map(d => {
          const h = new Date(d.t+'Z').getUTCHours();
          return {x:d[field], y:d.no, isDay:h>=7&&h<19};
        });
      }
      const dayPts = points.filter(p=>p.isDay);
      const nightPts = points.filter(p=>!p.isDay);

      charts.scatter = new Chart($('#chartScatter'), {
        type:'scatter', data:{datasets:[
          {label:'Day (07–19)', data:dayPts.map(p=>({x:p.x,y:p.y})), backgroundColor:COL.yellow+'44', pointRadius:1.5, pointHoverRadius:4},
          {label:'Night (19–07)', data:nightPts.map(p=>({x:p.x,y:p.y})), backgroundColor:COL.indigo+'44', pointRadius:1.5, pointHoverRadius:4}
        ]},
        options:{scales:{x:{title:{display:true,text:xMap[xKey]}},y:{title:{display:true,text:'Noise (dB)'}}}, plugins:{zoom:ZO,legend:{labels:{boxWidth:8}}}}
      });
    }
    drawScatter('temp');
    $('#scatterXSelect').onchange = e => drawScatter(e.target.value);
  });
}

// ═══════════════════════════════════════
// TRANSPORT TAB
// ═══════════════════════════════════════
function buildTransport(root) {
  // Key finding callout
  const callout = el('div','callout');
  callout.innerHTML = `<div class="callout-title">🚇 Transport Integration — Gloucester Road Station</div>
    <div class="callout-text">Monitoring Circle, District & Piccadilly lines. TfL API polled every 5 minutes for train arrivals, service status, and air quality data. Cross-referencing with acoustic sensor at window position.</div>`;
  root.appendChild(callout);

  const grid = el('div','grid grid-2');
  grid.style.marginTop = '12px';

  // Hourly noise vs trains
  const hourCard = el('div','card span-2');
  hourCard.innerHTML = `<div class="card-label">Hourly Profile — Noise vs Train Arrivals (Dual Axis)</div><canvas id="chartHourly"></canvas>${interactionHint()}`;
  grid.appendChild(hourCard);

  // Line status
  const statusCard = el('div','card');
  const ls = D.latestStatus;
  statusCard.innerHTML = `<div class="card-label">Line Status — Latest</div>
    ${['circle','district','piccadilly'].map(line => {
      const code = ls[line];
      const status = SL[code]||'Unknown ('+code+')';
      const color = SC[code]||'#6b7a94';
      return `<div class="line-badge" style="border-left-color:${LC[line]}">
        <div class="line-badge-name">${line}</div>
        <span class="line-badge-status" style="background:${color}22;color:${color}">${status}</span>
      </div>`;
    }).join('')}
    <div style="margin-top:12px;font-size:11px;color:var(--text-secondary);font-weight:600">Service Summary (% of monitoring period):</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px">
      <span style="font-size:9px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:${COL.green};display:inline-block"></span><span style="color:var(--text-secondary)">Good Service</span></span>
      <span style="font-size:9px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:${COL.yellow};display:inline-block"></span><span style="color:var(--text-secondary)">Delays</span></span>
      <span style="font-size:9px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:${COL.orange};display:inline-block"></span><span style="color:var(--text-secondary)">Closure/Suspended</span></span>
      <span style="font-size:9px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:2px;background:#3d4a5e;display:inline-block"></span><span style="color:var(--text-secondary)">Service Closed</span></span>
    </div>
    ${['circle','district','piccadilly'].map(line => {
      const ss = D.statusSummary[line];
      return `<div style="margin-top:6px;font-size:10px"><b style="color:${LC[line]};text-transform:capitalize">${line}</b>
        <div class="hyp-bar" style="height:8px;border-radius:4px">${Object.entries(ss).map(([s,pct]) => {
          const c = s==='Good Service'?COL.green:s.includes('Delay')?COL.yellow:s.includes('Closure')||s.includes('Suspended')?COL.orange:s.includes('Closed')?'#3d4a5e':COL.red;
          return `<div class="hyp-bar-seg" style="width:${pct}%;background:${c}" title="${s}: ${pct}%"></div>`;
        }).join('')}</div>
        <div style="font-size:10px;color:var(--text-secondary);margin-top:3px">${Object.entries(ss).map(([s,pct])=>`<span style="color:var(--text-primary);font-family:var(--font-mono);font-weight:500">${pct}%</span> ${s}`).join(' · ')}</div>
      </div>`;
    }).join('')}`;
  grid.appendChild(statusCard);

  // Air quality + daily pressure
  const rightCol = el('div','');
  rightCol.style.display = 'flex';
  rightCol.style.flexDirection = 'column';
  rightCol.style.gap = '12px';

  const airCard = el('div','card');
  const airSum = D.airSummary;
  const latestAir = D.latestAir;
  const airColor = latestAir === 'Low' ? COL.green : latestAir === 'Moderate' ? COL.yellow : COL.red;
  airCard.innerHTML = `<div class="card-label">Air Quality — TfL Index</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div class="card-value" style="color:${airColor};font-size:24px">${latestAir}</div>
      <div style="font-size:10px;color:var(--text-secondary)">Current reading</div>
    </div>
    <div class="hyp-bar" style="height:10px;border-radius:5px">
      ${Object.entries(airSum).map(([level,pct])=>{
        const c = level==='Low'?COL.green:level==='Moderate'?COL.yellow:COL.red;
        return `<div class="hyp-bar-seg" style="width:${pct}%;background:${c}" title="${level}: ${pct}%"></div>`;
      }).join('')}
    </div>
    <div style="font-size:9px;color:var(--text-muted);margin-top:4px">${Object.entries(airSum).map(([l,p])=>`${l}: ${p}%`).join(' · ')}</div>`;
  rightCol.appendChild(airCard);

  const pressCard = el('div','card');
  pressCard.innerHTML = `<div class="card-label">Daily Pressure Trend</div><canvas id="chartDailyPressure"></canvas>`;
  rightCol.appendChild(pressCard);

  grid.appendChild(rightCol);

  root.appendChild(grid);

  requestAnimationFrame(() => {
    const hd = D.hourly;
    const toggleLegend = (e, item, legend) => {
      const meta = legend.chart.getDatasetMeta(item.datasetIndex);
      meta.hidden = !meta.hidden;
      legend.chart.update();
    };

    charts.hourly = new Chart($('#chartHourly'), {
      type:'bar', data:{labels:hd.map(d=>d.hour+'h'), datasets:[
        {label:'Noise (dB)', data:hd.map(d=>d.noise), backgroundColor:COL.purple+'55', borderColor:COL.purple, borderWidth:1, borderRadius:3, yAxisID:'y'},
        {label:'Trains/poll', data:hd.map(d=>d.trains), type:'line', borderColor:COL.yellow, borderWidth:2.5, pointRadius:3, pointBackgroundColor:COL.yellow, yAxisID:'y1'}
      ]},
      options:{interaction:{mode:'index',intersect:false},
        scales:{x:{},y:{position:'left',title:{display:true,text:'Noise (dB)'},ticks:{color:COL.purple}},y1:{position:'right',title:{display:true,text:'Trains'},grid:{drawOnChartArea:false},ticks:{color:COL.yellow}}},
        plugins:{legend:{labels:{boxWidth:10},onClick:toggleLegend}}}
    });

    const dd = D.daily;
    charts.dailyPress = new Chart($('#chartDailyPressure'), {
      type:'line', data:{labels:dd.map(d=>d.date), datasets:[
        {label:'hPa', data:dd.map(d=>d.press_mean), borderColor:COL.green, backgroundColor:COL.green+'15', fill:true, borderWidth:2, pointRadius:3, pointBackgroundColor:COL.green}
      ]},
      options:{scales:{y:{min:Math.min(...dd.map(d=>d.press_mean))-2}}, plugins:{legend:{display:false}}}
    });
  });
}

// Init
renderTabs();
renderPage();

</script>
